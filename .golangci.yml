version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    - revive
  settings:
    revive:
      rules:
        - name: file-length-limit
          arguments:
            - max: 1500
              skip-comments: false
              skip-blank-lines: false
formatters:
  enable:
    - gofmt

issues:
  exclude-use-default: false
